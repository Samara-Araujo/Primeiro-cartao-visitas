<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Serviço de Passadeira - Profissional</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #e3f2fd; /* Um azul bem clarinho para limpeza */
            color: #333;
            padding: 40px 20px;
            margin: 0;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 20px; /* Bordas arredondadas na foto ficam lindas */
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); /* Sombra só na foto */
            margin: 20px 0;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            max-width: 600px;
            margin: 20px auto;
        }

        .btn-whatsapp {
            background-color: #25d366;
            color: white;
            padding: 18px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            display: inline-block;
            transition: transform 0.2s; /* Efeito de apertar o botão */
        }

        .btn-whatsapp:hover {
            transform: scale(1.05);
            background-color: #128c7e;
        }
    </style>
</head>
<body>

    <h1>Serviço de Passadeira</h1>

    <figure>
        <img src="imagens/foto-lavadeira-jpg.jfif" alt="lavadeiras">
    </figure>

    <p>
        Suas roupas prontas, sem sair de casa.<br>
        <strong>Atendimento rápido e de confiança.</strong>
    </p>

    <a href="https://wa.me/5500000000000?text=Olá! Gostaria de agendar para passar minhas roupas." 
       class="btn-whatsapp" 
       target="_blank">
       Falar com a Passadeira no WhatsApp
    </a>

</body>
</html>
